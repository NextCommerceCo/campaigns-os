name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: campaigns-os
      # Pin the templates checkout to the commit the vendored catalog snapshot was
      # built from (`_synced_from_sha`), so check-template-doctrine validates the
      # partial defaults the agent actually consumes rather than drifting live HEAD.
      # Falls back to `main` for legacy snapshots that predate provenance stamping.
      - name: Resolve templates pin from catalog provenance
        id: pin
        run: |
          sha="$(jq -r '._synced_from_sha // empty' campaigns-os/contracts/commerce-surface-catalog.json)"
          if [ -z "$sha" ]; then
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "No _synced_from_sha in catalog (legacy snapshot); using main."
          elif printf '%s' "$sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "ref=$sha" >> "$GITHUB_OUTPUT"
            echo "Pinning templates checkout to catalog _synced_from_sha=$sha"
          else
            echo "::error::catalog _synced_from_sha is malformed ('$sha'); expected a 40-char commit SHA. Re-run refresh:starter-catalog."
            exit 1
          fi
      - uses: actions/checkout@v7
        with:
          repository: NextCommerceCo/campaign-cart-starter-templates
          ref: ${{ steps.pin.outputs.ref }}
          path: campaign-cart-starter-templates
      - uses: actions/setup-node@v7
        with:
          # The campaign-spec test suite runs as TypeScript via `node --test`
          # (native type stripping, unflagged since 23.6). The PUBLISHED package
          # is compiled to plain JS and runs on engines.node (>=20); this newer
          # toolchain version only gates running the .ts tests in CI.
          node-version: "24"
      # Installs devDeps (typescript) and runs `prepare` -> build:spec, so the
      # compiled campaign-spec/dist exists before `check` (which now imports it
      # via the CLI and runs `tsc`). Without this, `check` fails — `tsc` is not
      # a global.
      - run: npm ci
        working-directory: campaigns-os
      - run: npm run check
        working-directory: campaigns-os
        env:
          STARTER_TEMPLATES_PATH: ${{ github.workspace }}/campaign-cart-starter-templates
